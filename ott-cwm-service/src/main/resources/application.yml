spring:
  application:
    name: ott-cwm-service
  datasource:
    url: jdbc:h2:mem:cwmdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ott-cwm-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8083

logging:
  level:
    com.cwm: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

cwm:
  workflow:
    default-max-retries: 3
    failure-rate: 0.25
    min-execution-delay-ms: 1000
    max-execution-delay-ms: 3000
    backoff-multiplier: 2.0
    initial-backoff-ms: 1000
  topics:
    content-ingested: content.ingested
    job-queue: job.queue
    job-completed: job.completed
