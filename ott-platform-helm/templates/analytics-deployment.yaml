apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
spec:
  replicas: {{ .Values.analyticsService.replicas }}
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: {{ .Values.analyticsService.image }}
          ports:
            - containerPort: {{ .Values.analyticsService.port }}