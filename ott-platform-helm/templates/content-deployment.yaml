apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-service
spec:
  replicas: {{ .Values.contentService.replicas }}
  selector:
    matchLabels:
      app: content-service
  template:
    metadata:
      labels:
        app: content-service
    spec:
      containers:
      - name: content-service
        image: {{ .Values.contentService.image }}
        ports:
        - containerPort: {{ .Values.contentService.port }}
        env:
          - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
            value: "kafka.kafka:9092"