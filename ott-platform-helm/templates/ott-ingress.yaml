apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ott-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /content(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: content-service
            port:
              number: 8081
      - path: /analytics(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: analytics-service
            port:
              number: 8081
      - path: /cwm(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: cwm-service
            port:
              number: 8083
      - path: /opcon(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: opcon-controller
            port:
              number: 8084
